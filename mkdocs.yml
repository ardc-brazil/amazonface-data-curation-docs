site_name: AmazonFACE Data Curation Digital Book
site_description: Standards, protocols, and operational references for the AmazonFACE data curation pipeline.
site_author: AmazonFACE Data Curation Team
repo_name: amazonface-data-curation-docs
exclude_docs: |
  stories/**

theme:
  name: material

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables

extra_css:
  - assets/stylesheets/brand.css

nav:
  - Home: index.md
  - Part I - Program Foundations:
      - Purpose and Scope: foundations/01-purpose-and-scope.md
      - Governance and Compliance Standards: foundations/03-governance-and-compliance-standards.md
      - Dataset Context and Taxonomy: foundations/02-dataset-context-and-taxonomy.md
  - Part II - Portfolio Mapping and Onboarding:
      - Dataset Mapping and Prioritization: pipeline-standards/09-dataset-mapping-and-prioritization.md
      - Responsible Contact and Training: pipeline-standards/10-responsible-contact-and-training.md
      - Ingestion and Validation: pipeline-standards/05-ingestion-and-validation.md
  - Part III - Curation Pipeline and Data Products:
      - End-to-End Curation Workflow: pipeline-standards/04-pipeline-overview-e2e.md
      - Data Cleaning and Normalization: pipeline-standards/07-data-cleaning-and-normalization.md
      - Annotation and Labeling Standards: pipeline-standards/06-annotation-and-labeling-standards.md
      - Quality Assurance and Acceptance Gates: pipeline-standards/08-quality-assurance-and-acceptance-gates.md
  - Part IV - Storage, Publication, and Release:
      - Data Lake and WebDAV Storage: pipeline-standards/11-data-lake-webdav-storage.md
      - DataMap Publication and DOI: pipeline-standards/12-datamap-publication-and-doi.md
      - Release, Versioning, and Change Control: operations/10-release-versioning-and-change-control.md
  - Part V - Operations and Continuous Improvement:
      - Observability and Metrics: operations/09-observability-and-metrics.md
      - Incident Response and Exception Handling: operations/11-incident-response-and-exception-handling.md
  - Appendices:
      - Glossary: appendices/glossary.md
      - Checklists: appendices/checklists.md
      - Technical and Operational FAQ: appendices/faq.md
      - Source Traceability: appendices/source-traceability.md
  - Authoring Templates:
      - Templates Overview: authoring/templates-overview.md
      - Chapter Template: authoring/chapter-template.md
      - SOP Template: authoring/sop-template.md
